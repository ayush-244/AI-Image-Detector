version: '3.9'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai-image-detector-backend
    ports:
      - '5000:5000'
    env_file:
      - ./backend/.env

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-image-detector-frontend
    ports:
      - '5173:80'
    depends_on:
      - backend
